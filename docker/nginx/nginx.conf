# 运行 nginx 的用户
user nginx;
# 自动设置 worker 进程数（通常等于 CPU 核心数）
worker_processes auto;
# 错误日志路径及级别
error_log /var/log/nginx/error.log warn;
# 进程 ID 文件
pid /var/run/nginx.pid;

# 事件模块配置
events {
    # 每个 worker 进程的最大并发连接数
    worker_connections 1024;
}

# HTTP 核心模块
http {
    # 引入 MIME 类型映射（如 .css -> text/css）
    include /etc/nginx/mime.types;
    # 默认 MIME 类型
    default_type application/octet-stream;

    # 日志格式定义
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    # 访问日志位置及格式
    access_log /var/log/nginx/access.log main;

    # 启用高效文件传输（零拷贝）
    sendfile on;
    # 防止网络拥塞，在 sendfile 开启时有效
    tcp_nopush on;
    # 长连接超时时间（秒）
    keepalive_timeout 65;
    # 启用 gzip 压缩
    gzip on;
    # 指定压缩的 MIME 类型
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ------------------------------
    # 后端服务器组（upstream）
    # ------------------------------
    upstream backend {
        # ip_hash：基于客户端 IP 的哈希算法，保证同一 IP 的所有请求都转发到同一后端
        # 这对 WebSocket 长连接至关重要，避免连接漂移导致会话断开
        ip_hash;
        # 后端实例，使用 Docker 服务名（需在同一自定义网络）
        server backend1:8080;
        server backend2:8080;
    }

    # ============================================
    # 新增：Instance 1 专用测试入口（子域名）
    # 访问: http://inst1.localhost
    # 作用: 强制所有请求路由到 backend1，用于测试跨实例消息
    # ============================================
    server {
        listen 80;
        server_name inst1.localhost;

        # 前端静态文件根目录（与生产环境完全一致）
        root /usr/share/nginx/html;
        index index.html;

        # 代理后端 API 请求 - 强制指向 backend1
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 代理 WebSocket 连接 - 强制指向 backend1
        location /ws {
            proxy_pass http://backend1:8080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # minio 代理（如需访问）
        location ^~ /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # 静态资源缓存（js/css/图片等）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 处理 Vue Router 的 history 模式
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 禁止访问隐藏文件（如 .git）
        location ~ /\. {
            deny all;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ============================================
    # 新增：Instance 2 专用测试入口（子域名）
    # 访问: http://inst2.localhost
    # 作用: 强制所有请求路由到 backend2，用于测试跨实例消息
    # ============================================
    server {
        listen 80;
        server_name inst2.localhost;

        # 前端静态文件根目录（与生产环境完全一致）
        root /usr/share/nginx/html;
